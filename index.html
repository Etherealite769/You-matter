<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Always Matter - Mental Health Awareness</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="background"></div>
        
        <div class="content">
            <h1 class="main-title">
                <span class="letter" style="--i: 1;">Y</span>
                <span class="letter" style="--i: 2;">o</span>
                <span class="letter" style="--i: 3;">u</span>
                <span class="letter" style="--i: 4;"> </span>
                <span class="letter" style="--i: 5;">A</span>
                <span class="letter" style="--i: 6;">l</span>
                <span class="letter" style="--i: 7;">w</span>
                <span class="letter" style="--i: 8;">a</span>
                <span class="letter" style="--i: 9;">y</span>
                <span class="letter" style="--i: 10;">s</span>
                <span class="letter" style="--i: 11;"> </span>
                <span class="letter" style="--i: 12;">M</span>
                <span class="letter" style="--i: 13;">a</span>
                <span class="letter" style="--i: 14;">t</span>
                <span class="letter" style="--i: 15;">t</span>
                <span class="letter" style="--i: 16;">e</span>
                <span class="letter" style="--i: 17;">r</span>
            </h1>
            
            <div class="subtitle-container">
                <p class="subtitle">Mental Health Awareness</p>
            </div>
            
            <div class="message-box">
                <p class="message">Your mental health matters. You deserve care, compassion, and support.</p>
            </div>
            
            <div class="pulse-circle"></div>
            <div class="pulse-circle pulse-circle-2"></div>
        </div>
        
        <footer class="footer">
            <p>Take care of yourself. Reach out. You are not alone. 💚</p>
        </footer>
    </div>
</body>
</html>
